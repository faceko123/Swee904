<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deal Telegram</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff512f,#dd2476);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.box{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:15px;
width:330px;
}

.btn{
display:block;
margin-top:15px;
padding:12px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
background:#0088cc;
}

</style>

<script>

let shopee="https://shopee.vn/link-cua-ban"

function checkRedirect(e){

let first=localStorage.getItem("first")

if(!first){

localStorage.setItem("first","done")

window.location.href=shopee

e.preventDefault()

}

}

document.addEventListener("click",checkRedirect)

</script>

</head>

<body>

<div class="box">

<h2>Nhận deal Telegram</h2>

<p>Chọn nhóm bên dưới</p>

<a class="btn" href="https://t.me/link1">
Telegram nhóm 1
</a>

<a class="btn" href="https://t.me/link2">
Telegram nhóm 2
</a>

<a class="btn" href="https://t.me/link3">

</a>

</div>

</html>
