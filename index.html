<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Deal Telegram</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #ffffff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    display: flex;
    gap: 40px;
    align-items: center;
}

.box {
    background: #f5f5f5;
    padding: 30px;
    border-radius: 12px;
    width: 260px;
    text-align: center;
}

h2 {
    color: #333;
}

p {
    color: #555;
}

.btn {
    display: block;
    margin-top: 12px;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    background: #0088cc;
}

.btn:hover {
    background: #0074ad;
}

.image img {
    width: 300px;
    border-radius: 12px;
}

</style>

<script>

let shopee = "https://shopee.vn/link-cua-ban";

function checkRedirect(e) {

    let first = localStorage.getItem("first");

    if (!first) {
        localStorage.setItem("first", "done");
        window.location.href = shopee;
        e.preventDefault();
    }

}

document.addEventListener("click", checkRedirect);

</script>

</head>

<body>

<div class="container">

    <div class="box">

        <h2>Nhận deal Telegram</h2>

        <p>Chọn nhóm bên dưới</p>

        <a class="btn" href="https://t.me/link1">
            Telegram nhóm 1
        </a>

        <a class="btn" href="https://t.me/link2">
            Telegram nhóm 2
        </a>

        <a class="btn" href="https://t.me/link3">
            Telegram nhóm 3
        </a>

    </div>

    <div class="image">

        <img src="anh.jpg" alt="Ảnh quảng cáo">

    </div>

</div>

</body>

</html>
