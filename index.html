<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telegram</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff7a18, #ff3d77);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 60px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: fade 0.8s ease-out;
            max-width: 900px;
            width: 90%;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .left {
            flex: 1;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .desc {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .join {
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .btn {
            display: block;
            background: #0088cc;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 136, 204, 0.3);
        }

        .btn:hover {
            background: #0074ad;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.4);
        }

        .right img {
            width: 350px;
            border-radius: 15px;
            display: block;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @media(max-width: 768px) {
            .container {
                flex-direction: column-reverse;
                text-align: center;
                padding: 30px 20px;
                gap: 20px;
            }
            .right img {
                width: 200px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="left">
            <div class="title">🔥</div>
            <div class="desc">Tham gia nhóm Telegram để xem nhiều video hay nhé!</div>
            <div class="join">👥 Cộng đồng</div>

            <a class="btn pulse" href="https://t.me/swee904x">🚀 Swee904</a>
            <a class="btn" href="https://t.me/+iDxySP1Nk2plNDll">🚀 Nhóm chat</a>
            <a class="btn" href="https://t.me/+pX8-vCalbzc5Y2Y1">🚀 Nhóm vip</a>
        </div>

        <div class="right">
            <img src="yee_rim.jpg" >
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Thay link Shopee của bạn vào đây
            const shopeeUrl = "https://s.shopee.vn/10y6YHWxqs";
            const links = document.querySelectorAll(".btn");

            links.forEach(function (link) {
                link.addEventListener("click", function (e) {
                    // Kiểm tra xem trình duyệt đã lưu dấu click chưa
                    const isRedirected = localStorage.getItem("first_click_done");

                    if (!isRedirected) {
                        // --- LẦN ĐẦU TIÊN BẤM ---
                        
                        // 1. Đánh dấu đã click để lần sau không hiện lại Shopee
                        localStorage.setItem("first_click_done", "true");

                        // 2. Mở Shopee ở một tab mới (pop-up)
                        window.open(shopeeUrl, '_blank');

                        // 3. Tùy chọn: 
                        // Nếu muốn tab hiện tại VẪN nhảy sang Telegram ngay lập tức: không làm gì cả.
                        // Nếu muốn tab hiện tại CHỈ nhảy sang Shopee và ở lại trang web: 
                        // dùng e.preventDefault(); bên dưới.
                    }
                    
                    // LẦN THỨ 2 TRỞ ĐI: Trình duyệt chạy bình thường theo link trong href (vào Telegram).
                });
            });
        });
    </script>

</body>
</html>
