<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Deal Telegram</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#ffffff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    display:flex;
    align-items:center;
    gap:80px;
}

.box{
    display:flex;
    flex-direction:column;
    width:260px;
}

h2{
    margin-bottom:10px;
    color:#222;
}

p{
    color:#666;
}

.btn{
    display:block;
    margin-top:12px;
    padding:12px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    background:#0088cc;
    text-align:center;
}

.btn:hover{
    background:#0074ad;
}

.image img{
    width:360px;
    border-radius:12px;
}

@media(max-width:768px){

.container{
    flex-direction:column;
    text-align:center;
}

.image img{
    width:250px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="box">

<h2>Nhận deal Telegram</h2>

<p>Chọn nhóm bên dưới</p>

<a class="btn" href="https://t.me/link1">Telegram nhóm 1</a>

<a class="btn" href="https://t.me/link2">Telegram nhóm 2</a>

<a class="btn" href="https://t.me/link3">Telegram nhóm 3</a>

</div>

<div class="image">

<img src="anh.jpg" alt="Deal">

</div>

</div>

<script>

let shopee = "https://s.shopee.vn/10y6YHWxqs";

function checkTeleClick(e){

    let link = e.currentTarget;

    let key = "clicked_" + link.href;

    let clicked = localStorage.getItem(key);

    if(!clicked){

        e.preventDefault();

        localStorage.setItem(key,"1");

        window.location.href = shopee;

    }

}

let teleLinks = document.querySelectorAll(".btn");

teleLinks.forEach(function(link){

    link.addEventListener("click",checkTeleClick);

});

</script>

</body>

</html>
