<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Deal Telegram</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #ffffff;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
}

.box {
    width: 300px;
}

h2 {
    color: #222;
}

p {
    color: #666;
}

.btn {
    display: block;
    margin-top: 12px;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    background: #0088cc;
}

.btn:hover {
    background: #0074ad;
}

.image img {
    width: 350px;
    border-radius: 12px;
}

</style>

<script>

let shopee = "https://shopee.vn/link-cua-ban";

function redirectFirst(e){

    let first = localStorage.getItem("visited");

    if(!first){
        e.preventDefault();
        localStorage.setItem("visited","true");
        window.location.href = shopee;
    }

}

document.addEventListener("click", redirectFirst);

</script>

</head>

<body>

<div class="container">

<div class="box">

<h2>Nhận deal Telegram</h2>

<p>Chọn nhóm bên dưới</p>

<a class="btn" href="https://t.me/link1">
Telegram nhóm 1
</a>

<a class="btn" href="https://t.me/link2">
Telegram nhóm 2
</a>

<a class="btn" href="https://t.me/link3">
Telegram nhóm 3
</a>

</div>

<div class="image">

<img src="anh.jpg" alt="Deal">

</div>

</div>

</body>

</html>
