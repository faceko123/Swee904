<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Nhận Deal Telegram</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 40px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
}

.box {
    max-width: 320px;
}

h2 {
    margin-bottom: 10px;
    color: #222;
}

p {
    color: #666;
}

.btn {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    background: #0088cc;
    color: white;
    transition: 0.2s;
}

.btn:hover {
    background: #0074ad;
    transform: translateY(-2px);
}

.btn img {
    width: 22px;
}

.image img {
    width: 350px;
    max-width: 100%;
    border-radius: 12px;
}

@media (max-width: 768px) {

.container {
    flex-direction: column;
    text-align: center;
}

.box {
    max-width: 100%;
}

}

</style>

<script>

let shopee = "https://shopee.vn/link-cua-ban";

function checkRedirect(e){

let first = localStorage.getItem("first");

if(!first){
localStorage.setItem("first","done");
window.location.href = shopee;
e.preventDefault();
}

}

document.addEventListener("click",checkRedirect);

</script>

</head>

<body>

<div class="container">

<div class="box">

<h2>🔥 Nhận Deal Telegram</h2>

<p>Tham gia nhóm để nhận deal Shopee giá rẻ mỗi ngày</p>

<a class="btn" href="https://t.me/link1">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
Telegram nhóm 1
</a>

<a class="btn" href="https://t.me/link2">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
Telegram nhóm 2
</a>

<a class="btn" href="https://t.me/link3">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
Telegram nhóm 3
</a>

</div>

<div class="image">

<img src="anh.jpg" alt="Deal Shopee">

</div>

</div>

</body>

</html>
