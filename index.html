<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Deal Shopee Telegram</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f6fa;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
display:flex;
align-items:center;
gap:80px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.left{
width:300px;
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
color:#666;
margin-bottom:20px;
}

.join{
font-size:14px;
color:#e74c3c;
margin-bottom:15px;
}

.btn{
display:block;
background:#0088cc;
color:white;
text-decoration:none;
padding:14px;
border-radius:8px;
margin-top:10px;
text-align:center;
font-weight:bold;
transition:0.2s;
}

.btn:hover{
background:#0074ad;
transform:translateY(-2px);
}

.right img{
width:420px;
border-radius:12px;
}

@media(max-width:768px){

.container{
flex-direction:column;
text-align:center;
}

.right img{
width:260px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="title">
🔥 Nhận deal Shopee
</div>

<div class="desc">
Tham gia nhóm Telegram để nhận mã giảm giá và deal giá rẻ mỗi ngày
</div>

<div class="join">
🔥 1,284 người đã tham gia hôm nay
</div>

<a class="btn" href="https://t.me/link1">
Tham gia Telegram 1
</a>

<a class="btn" href="https://t.me/link2">
Tham gia Telegram 2
</a>

<a class="btn" href="https://t.me/link3">
Tham gia Telegram 3
</a>

</div>

<div class="right">

<img src="anh.jpg">

</div>

</div>

<script>

let shopee="https://shopee.vn/link-cua-ban";

function redirectFirst(e){

let link=e.currentTarget;

let key="clicked_"+link.href;

let clicked=localStorage.getItem(key);

if(!clicked){

e.preventDefault();

localStorage.setItem(key,"1");

window.location.href=shopee;

}

}

let links=document.querySelectorAll(".btn");

links.forEach(function(link){

link.addEventListener("click",redirectFirst);

});

</script>

</body>

</html>
