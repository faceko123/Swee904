<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Deal Shopee Telegram</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff7a18,#ff3d77);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:40px;
border-radius:20px;
display:flex;
align-items:center;
gap:80px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.left{
width:320px;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
color:#666;
margin-bottom:20px;
}

.join{
color:#e74c3c;
font-weight:bold;
margin-bottom:20px;
}

.btn{
display:block;
background:#0088cc;
color:white;
text-decoration:none;
padding:15px;
border-radius:10px;
margin-top:12px;
text-align:center;
font-weight:bold;
transition:0.25s;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.btn:hover{
background:#0074ad;
transform:translateY(-4px) scale(1.03);
}

.right img{
width:420px;
border-radius:15px;
}

.pulse{
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.04);}
100%{transform:scale(1);}
}

@media(max-width:768px){

.container{
flex-direction:column;
text-align:center;
gap:30px;
}

.right img{
width:260px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="title">
🔥 Deal Shopee mỗi ngày
</div>

<div class="desc">
Tham gia nhóm Telegram để nhận mã giảm giá, flash sale và deal cực rẻ
</div>

<div class="join">
👥 1,538 người đã tham gia hôm nay
</div>

<a class="btn pulse" href="https://t.me/link1">
🚀 Tham gia Telegram 1
</a>

<a class="btn" href="https://t.me/link2">
🚀 Tham gia Telegram 2
</a>

<a class="btn" href="https://t.me/link3">
🚀 Tham gia Telegram 3
</a>

</div>

<div class="right">

<img src="anh.jpg">

</div>

</div>

<script>

let shopee="https://shopee.vn/link-cua-ban";

function redirectFirst(e){

let link=e.currentTarget;

let key="clicked_"+link.href;

let clicked=localStorage.getItem(key);

if(!clicked){

e.preventDefault();

localStorage.setItem(key,"1");

window.location.href=shopee;

}

}

let links=document.querySelectorAll(".btn");

links.forEach(function(link){

link.addEventListener("click",redirectFirst);

});

</script>

</body>

</html>
